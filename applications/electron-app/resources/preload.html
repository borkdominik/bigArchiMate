<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: black;
        }

        /* Override Theia's .theia-preload */
        .theia-preload {
            background: black !important;
        }

        /* Hide Theia's built-in loading spinner */
        .theia-preload::after {
            display: none !important;
        }

        .bam-splash {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .bam-spinner-wrap {
            position: fixed;
            left: 50%;
            top: 87%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .bam-spinner {
            width: 52px;
            height: 52px;
            border: 4px solid rgba(50, 50, 255, 0.15);
            border-top-color: #aaaaaa;
            border-radius: 50%;
            animation: bam-spin 0.75s linear infinite;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        @keyframes bam-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <img class="bam-splash" src="resources/preload-img.png" alt="" />
    <div class="bam-spinner-wrap">
        <div class="bam-spinner"></div>
    </div>
</body>

</html>
